services:
  - type: web
    name: omega-ai-chat
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: omega-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: omega-db
    plan: free
