<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat - Omega AI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px; }
        .sidebar h2 { margin-top: 0; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 10px; margin: 5px 0; background: #34495e; border-radius: 5px; }
        .sidebar a:hover { background: #3d566e; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { background: #667eea; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; background: #f9f9f9; }
        .message { margin: 10px 0; padding: 10px; border-radius: 8px; max-width: 70%; }
        .user { background: #667eea; color: white; margin-left: auto; }
        .ai { background: white; border: 1px solid #ddd; }
        .input-area { padding: 20px; background: white; border-top: 1px solid #ddd; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; resize: none; height: 80px; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #5568d3; }
        .quota { background: #fff3cd; padding: 5px 10px; border-radius: 5px; font-size: 0.9em; }
        .ephemeral { background: #f8d7da; color: #721c24; padding: 10px; text-align: center; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🤖 Omega AI</h2>
        <a href="chat.html">💬 Chat</a>
        <a href="settings.html">⚙️ Paramètres</a>
        <a href="#" id="admin-link" style="display:none;">🔧 Admin</a>
        <a href="#" onclick="logout()">🚪 Déconnexion</a>
    </div>

    <div class="main">
        <div class="header">
            <span id="user-info">Chargement...</span>
            <span class="quota" id="quota-display">0/15</span>
        </div>

        <div class="ephemeral" id="ephemeral-notice" style="display:none;">
            ⚠️ Mode Éphémère : Vos messages ne sont pas sauvegardés
        </div>

        <div class="chat-container" id="chat-container"></div>

        <div class="input-area">
            <textarea id="prompt" placeholder="Votre message..."></textarea>
            <input type="file" id="file-upload" accept="image/*,.pdf,.txt">
            <div class="controls">
                <label><input type="checkbox" id="thinking"> Mode Réflexion</label>
                <button onclick="sendMessage()">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        let userInfo = null;

        async function loadUser() {
            const res = await fetch('/api/me', { credentials: 'include' });
            if (!res.ok) {
                window.location.href = 'login.html';
                return;
            }
            userInfo = await res.json();
            document.getElementById('user-info').innerText = `VIP ${userInfo.vip_level} | ${userInfo.phone}`;
            document.getElementById('quota-display').innerText = `${userInfo.daily_count}/${userInfo.limit}`;
            
            if (userInfo.is_admin) {
                document.getElementById('admin-link').style.display = 'block';
                document.getElementById('admin-link').href = 'admin.html';
            }
            
            if (userInfo.vip_level < 2) {
                document.getElementById('ephemeral-notice').style.display = 'block';
            } else {
                loadHistory();
            }
        }

        async function loadHistory() {
            const res = await fetch('/api/history', { credentials: 'include' });
            const data = await res.json();
            const container = document.getElementById('chat-container');
            data.history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
                div.innerText = msg.content;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const prompt = document.getElementById('prompt').value;
            const useThinking = document.getElementById('thinking').checked;
            const fileInput = document.getElementById('file-upload');
            
            const formData = new FormData();
            formData.append('prompt', prompt);
            formData.append('use_thinking', useThinking);
            if (fileInput.files[0]) formData.append('file', fileInput.files[0]);

            const container = document.getElementById('chat-container');
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.innerText = prompt;
            container.appendChild(userDiv);

            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai';
            container.appendChild(aiDiv);

            document.getElementById('prompt').value = '';
            fileInput.value = '';

            const response = await fetch('/api/chat/send', {
                method: 'POST',
                body: formData,
                credentials: 'include'
            });

            if (!response.ok) {
                const err = await response.json();
                alert(err.detail || 'Erreur');
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let result = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                result += decoder.decode(value);
                aiDiv.innerText = result;
                container.scrollTop = container.scrollHeight;
            }

            userInfo.daily_count++;
            document.getElementById('quota-display').innerText = `${userInfo.daily_count}/${userInfo.limit}`;
        }

        function logout() {
            document.cookie = 'access_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC';
            window.location.href = 'login.html';
        }

        loadUser();
    </script>
</body>
</html>
